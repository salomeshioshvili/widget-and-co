<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — AI Widget Builder</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app login-page">
    <div class="login-card">
      <h1>AI Widget Builder</h1>
      <p class="subtitle">Sign in with Google to create and manage your widgets.</p>
      <a href="/auth/google" class="btn btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.654 32.657 29.273 36 24 36c-5.522 0-10-4.478-10-10s4.478-10 10-10c2.426 0 4.652.86 6.391 2.278l6.016-6.016C33.436 9.053 28.9 7 24 7 13.507 7 5 15.507 5 26s8.507 19 19 19 19-8.507 19-19c0-1.274-.132-2.516-.389-3.717z"/>
          <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 16.108 18.961 13 24 13c2.426 0 4.652.86 6.391 2.278l6.016-6.016C33.436 9.053 28.9 7 24 7c-7.682 0-14.344 4.337-17.694 10.691z"/>
          <path fill="#4CAF50" d="M24 45c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.248 0-9.612-3.317-11.277-7.946l-6.522 5.025C9.505 39.556 16.227 45 24 45z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C42.022 35.026 45 30.675 45 26c0-1.274-.132-2.516-.389-3.717z"/>
        </svg>
        Sign in with Google
      </a>
      <p id="login-error" class="login-error hidden">Sign-in failed. Please try again.</p>
    </div>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('login-error').classList.remove('hidden');
    }
  </script>
</body>
</html>
